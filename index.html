<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>連線至 【TW】ＣＳ 同 學 會 １ v １ - B</title>
    
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2; url=steam://run/730//+connect 114.34.29.54:27019">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans TC',Arial,sans-serif;margin:0;padding:0;background:#020406;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
.background{position:absolute;top:0;left:0;width:100%;height:100%;background-image:url('https://raw.githubusercontent.com/papa8855/MAP/refs/heads/main/11129.jpg');background-size:cover;background-position:center;filter:brightness(.5) blur(4px);z-index:-1}
.container{position:relative;background:rgba(0,0,0,.9);padding:50px 40px;border-radius:8px;box-shadow:0 20px 50px rgba(0,0,0,.8);text-align:center;width:100%;max-width:650px;box-sizing:border-box;border:1px solid rgba(255,255,255,.1)}
h1{font-family:'Oswald',sans-serif;font-size:2.5em;margin-bottom:20px;color:#4da6ff;letter-spacing:2px;text-transform:uppercase}
p{font-size:1.2em;color:#aaa;margin-bottom:30px;line-height:1.6}
.button-group{display:flex;justify-content:center;gap:28px;margin-top:20px;width:100%}
.manual-link{width:150px;box-sizing:border-box;padding:12px 0;font-size:16px;background-color:#4da6ff;color:#fff;text-decoration:none;border-radius:4px;font-weight:700;transition:all .3s ease;white-space:nowrap;text-align:center}
.manual-link:hover{background-color:#a63a23;transform:translateY(-2px);box-shadow:0 5px 15px rgba(166,58,35,.3)}
.manual-link:active{background-color:#7a2a19}
.manual-link.secondary{background-color:#FF5733}
.manual-link.secondary:hover{background-color:#1a7bb9;transform:translateY(-2px);box-shadow:0 5px 15px rgba(26,123,185,.3)}
.manual-link.secondary:active{background-color:#104f77}
.manual-link.third{background-color:#28a745}
.manual-link.third:hover{background-color:#1e7e34;transform:translateY(-2px);box-shadow:0 5px 15px rgba(40,167,69,.3)}
.manual-link.third:active{background-color:#155724}
.manual-link.disabled{background-color:#555 !important;color:#999 !important;cursor:not-allowed !important;pointer-events:none;box-shadow:none !important;transform:none !important}
.loader{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 30px auto;position:relative;overflow:hidden}
.loader::after{content:'';position:absolute;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#4da6ff,transparent);animation:slide-progress 3s steps(20) infinite}
@keyframes slide-progress{from{left:-100%}to{left:100%}}
.cs2-blue{color:#4da6ff;font-weight:900}
.text-red{color:#FF5733;font-weight:900}
@media (min-width: 760px) {
    .container { max-width: 855px; padding: 67px 53px; border-radius: 11px; }
    h1 { font-size: 3.33em; margin-bottom: 27px; }
    p { font-size: 1.6em; margin-bottom: 40px; }
    .button-group { gap: 37px; margin-top: 27px; }
    .manual-link { width: 200px; padding: 16px 0; font-size: 21px; border-radius: 5px; }
    .loader { width: 320px; height: 5px; margin: 0 auto 40px auto; }
}
@media (min-width: 1000px) {
    .container { max-width: 1000px; padding: 80px 60px; border-radius: 16px; }
    h1 { font-size: 3.5em; margin-bottom: 40px; }
    p { font-size: 2.2em; margin-bottom: 60px; }
    .button-group { gap: 56px; margin-top: 40px; }
    .manual-link { width: 300px; padding: 24px 0; font-size: 28px; border-radius: 8px; }
    .loader { width: 480px; height: 8px; margin: 0 auto 60px auto; }
}
</style>
</head>
<body>

<div class="background"></div>

<div class="container">
    <h1>正連線至 <span class="text-red">１ v １ </span> 伺 服 器</h1>
    <div class="loader"></div>
    <p>
        正在準備連線到伺服器，請稍候
        <br><br>
        系統將於 <span class="text-red">３</span> 秒後自動連線 <span class="cs2-blue">１ v １ - B 服 (27019)</span>
    </p>
    
   <div class="button-group">
    <a href="steam://run/730//+connect 114.34.29.54:27019" class="manual-link secondary">
        1 v 1-B (27019)
    </a>
    
    <a href="steam://run/730//+connect 114.34.29.54:27018" class="manual-link">
        1 v 1-A (27018)
    </a>

    <a href="steam://run/730//+connect 114.34.29.54:27125" class="manual-link third" id="btn-c">
        1 v 1-AWP (假日)
    </a>
</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var today = new Date().getDay();
        var btnC = document.getElementById("btn-c");
        if (today >= 1 && today <= 5) {
            btnC.classList.add("disabled");
            btnC.innerHTML = "1v1-AWP (假日限定)";
            btnC.removeAttribute("href");
        }
    });
</script>

</body>
</html>
